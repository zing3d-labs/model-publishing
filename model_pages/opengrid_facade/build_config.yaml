# Image generation settings
images:
  defaults:
    resolution: [1920, 1080]
    background: "white"
    colorscheme: "DeepOcean"

  views:
    - variant: "lite_4x4"
      shots:
        - name: "hero"
          camera:
            position: [220, -180, 150]
            look_at: [0, 0, 5]
          filename: "facade_lite_4x4_hero.png"
        - name: "snap_detail"
          camera:
            position: [180, -60, 25]
            look_at: [0, 0, 3]
          filename: "facade_lite_4x4_snap.png"


# Modular template system
templates:
  base_template: "base_template.md"
  template_root: "../../templates"

  sites:
    makerworld:
      base_template: "makerworld_base.md"
      output_file: "descriptions/makerworld_description.txt"
      model_type: "remix"
      category: "Organizers"
      tags: "opengrid, facade, panel, cover, modular, grid, organization, parametric, customizer"
      source_urls:
        - "https://makerworld.com/en/models/1179191-opengrid-wall-desk-mounting-framework-ecosystem"
      print_profile:
        name: "0.2mm layer, 2 walls, 15% infill"
        settings:
          - "0.2mm layer height"
          - "2 walls"
          - "15% infill"
          - "No supports required"
          - "Print flat side down"
        notes: "The facade is a thin, flat part so it prints quickly and doesn't need high infill or extra walls for strength."

# Build pipeline settings
build:
  output_directory: "dist/"
  clean_before_build: true

  openscad:
    executable: "openscad"
    timeout: 300
    additional_flags: ["--enable=manifold", "--export-format=binstl"]

  render:
    timeout: 120
    additional_flags: ["--render"]
