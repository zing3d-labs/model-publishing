# OpenGrid Facade Build Configuration
# Generates all Lite facade sizes from 2x2 to 9x9 (max that fits on a 256mm Bambu P1S plate)
# 36 variants total

project:
  name: "openGrid Facade"
  makerworld_url: "https://makerworld.com/en/models/2429606-opengrid-facade"
  collection: "opengrid"
  description: "Flat facade panel with snap connectors for covering openGrid tiles. Features configurable corner refinement, snap placement, and removal notches."
  version: "1.0.0"
  author: "Jonathan Huizingh"
  license: "CC BY-NC-SA 4.0"

source:
  input_file: "../../models/opengrid/parts/opengrid_facade.scad"
  libraries:
    - "../../models/external/BOSL2/"
    - "../../models/external/QuackWorks/"

variants:
