name: Publish Changed Models

# Runs when a PR is merged to main. Detects which model configs changed,
# increments their version tags, builds descriptions, and uploads as artifacts.
on:
  push:
    branches: [main, fix-publish-workflow]

permissions:
  contents: write  # required to push version tags

jobs:
  # ── 1. Figure out which models need rebuilding ─────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.detect.outputs.models }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD^ for the diff

      - name: Detect changed model configs
        id: detect
        run: echo "models=$(python scripts/detect_changed_models.py)" >> "$GITHUB_OUTPUT"

      - name: Show detected models
        run: echo "Models to rebuild -> ${{ steps.detect.outputs.models }}"

  # ── 2. Build descriptions + tag the commit ─────────────────────────────────
  build-descriptions:
    needs: detect-changes
    if: needs.detect-changes.outputs.models != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.detect-changes.outputs.models) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so we can inspect all existing tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install jinja2 pyyaml

      # ── Determine the next version for this model ──────────────────────────
      # Tag format: <model>/v<major>.<minor>.<patch>
      # If no tags exist yet, the first tag matches the version already in
      # build_config.yaml (typically 1.0.0). Subsequent runs increment patch.
      - name: Determine next version
        id: version
        run: |
          git fetch --tags
          NEXT=$(python scripts/ci_next_version.py "${{ matrix.model }}")
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ matrix.model }}/v${NEXT}" >> "$GITHUB_OUTPUT"

      # ── Inject the new version into the config before building ─────────────
      # The builder reads project.version from the YAML and passes it to
      # templates, so we patch it in-place in the CI workspace (not committed).
      - name: Inject version into build config
        run: python scripts/ci_patch_version.py "${{ matrix.model }}" "${{ steps.version.outputs.version }}"

      # ── Build descriptions only (no STL / image rendering in CI yet) ───────
      - name: Build descriptions
        run: python scripts/scad_builder.py "model_pages/${{ matrix.model }}/build_config.yaml" -d

      # ── Resolve the output path (project name may differ from dir name) ────
      - name: Resolve descriptions output path
        id: outdir
        run: echo "path=$(python scripts/ci_output_dir.py '${{ matrix.model }}')" >> "$GITHUB_OUTPUT"

      # ── Upload descriptions as a named artifact ────────────────────────────
      - name: Upload descriptions artifact
        uses: actions/upload-artifact@v4
        with:
          name: descriptions--${{ matrix.model }}--v${{ steps.version.outputs.version }}
          path: ${{ steps.outdir.outputs.path }}/
          if-no-files-found: error

      # ── Tag the merge commit ───────────────────────────────────────────────
      - name: Tag merge commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" "${{ github.sha }}"
          git push origin "${{ steps.version.outputs.tag }}"
